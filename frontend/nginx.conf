server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-eingebauter DNS-Resolver — erzwingt Laufzeit- statt Start-Zeit-Auflösung
    # des Backend-Hostnamens. Ohne das würde nginx beim Start abstürzen, falls der
    # Backend-Container zu diesem Zeitpunkt noch nicht erreichbar ist.
    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_headers on;
    }

    # SPA-Fallback: unbekannte Pfade (z.B. /receipts nach hartem Reload) -> index.html,
    # SvelteKits Client-Router übernimmt danach
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache-Busting: Assets unter /_app/immutable sind content-hashed, dürfen lang cachen
    location /_app/immutable/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
