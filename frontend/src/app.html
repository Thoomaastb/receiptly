<!doctype html>
<html lang="de">
	<head>
		<script>
			// Anti-FOUC (Dark Mode, v0.28.0): setzt data-theme vor dem ersten Paint.
			// Duplikat der Logik aus lib/theme.ts — app.html hat keinen Build-Step,
			// kann das Modul also nicht importieren. STORAGE_KEY ('receiptly:theme')
			// MUSS mit theme.ts synchron gehalten werden.
			(function () {
				try {
					var pref = localStorage.getItem('receiptly:theme');
					var effective =
						pref === 'light' || pref === 'dark'
							? pref
							: matchMedia('(prefers-color-scheme: dark)').matches
								? 'dark'
								: 'light';
					document.documentElement.setAttribute('data-theme', effective);
				} catch (e) {
					// localStorage/matchMedia nicht verfügbar (z.B. privater Modus) — Fallback hell
				}
			})();
		</script>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
