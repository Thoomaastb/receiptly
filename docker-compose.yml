services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - intern-receiptly
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - intern-receiptly

  app:
    # Vorgebautes Image aus GHCR — "docker compose pull && docker compose up -d"
    # funktioniert ohne Code-Checkout, nur diese Datei + .env nötig.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-thomas}/receiptly:${RECEIPTLY_VERSION:-latest}
    # Lokaler Build als Fallback, falls kein Netzwerkzugriff auf GHCR oder eigene Änderungen:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: missing
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - storage-originals:/app/storage/originals
      - storage-thumbs:/app/storage/thumbs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - intern-receiptly
      - remote

volumes:
  db-data:
  storage-originals:
  storage-thumbs:

networks:
  # Internes Netzwerk — App <-> DB/Redis, von außen nicht erreichbar
  intern-receiptly:
    internal: true
  # Externes Netzwerk — Pangolin/Newt-Anbindung auf Apollo
  remote:
    external: true
