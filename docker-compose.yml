services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      - internal

  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-thoomaastb}/receiptly-backend:${RECEIPTLY_VERSION:-latest}
    build:
      context: ./backend
    pull_policy: missing
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - storage-originals:/app/storage/originals
      - storage-thumbs:/app/storage/thumbs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
#      - remote

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-thoomaastb}/receiptly-frontend:${RECEIPTLY_VERSION:-latest}
    build:
      context: ./frontend
    pull_policy: missing
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - internal
#      - remote

volumes:
  db-data:
  storage-originals:
  storage-thumbs:

networks:
  internal:
    external: true
#  remote:
#    external: true
