services:
  backend:
    environment:
      APP_ENV: development
    volumes:
      - ./backend/app:/app/app
      - ./VERSION:/app/VERSION:ro
      - storage-originals:/app/storage/originals
      - storage-thumbs:/app/storage/thumbs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

# Frontend bewusst nicht hier drin: fuer Hot-Reload laeuft "npm run dev" im
# frontend/-Ordner direkt (siehe README), der Vite-Dev-Proxy leitet /api an
# den Backend-Container weiter. Ein Container-Rebuild pro Aenderung waere langsamer.
