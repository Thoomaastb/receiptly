services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
    volumes:
      - ./backend/app:/app/app
      - storage-originals:/app/storage/originals
      - storage-thumbs:/app/storage/thumbs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

# Frontend bewusst nicht hier drin: für Hot-Reload laeuft "npm run dev" im
# frontend/-Ordner direkt (siehe README), der Vite-Dev-Proxy leitet /api an
# diesen Container weiter. Ein Docker-Container wuerde HMR nur verlangsamen.
