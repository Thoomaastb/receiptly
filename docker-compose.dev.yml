services:
  app:
    environment:
      APP_ENV: development
    volumes:
      - ./backend/app:/app/app
      - ./VERSION:/app/VERSION:ro
      - storage-originals:/app/storage/originals
      - storage-thumbs:/app/storage/thumbs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

# Frontend-Code ist statisch in "app" eingebaut (adapter-static, siehe Root-Dockerfile) —
# Aenderungen daran erfordern einen Rebuild ("docker compose up -d --build"), kein
# Live-Mount hier. Fuer schnelle Frontend-Iteration weiterhin optional "npm run dev" im
# frontend/-Ordner (siehe README) mit Vite-Dev-Proxy auf den Backend-Container; das ist
# ein separater, eigenstaendiger Pfad ausserhalb dieses Compose-Overlays.
